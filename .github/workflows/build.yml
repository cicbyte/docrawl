name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Read version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ -f VERSION ]]; then
            VERSION=v$(cat VERSION)
          else
            VERSION=0.0.0-${GITHUB_SHA::7}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs VERSION }}
          COMMIT=$(git rev-parse HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')
          go build -ldflags "-X 'github.com/cicbyte/docrawl/cmd.Version=${VERSION}' -X 'github.com/cicbyte/docrawl/cmd.BuildTime=${BUILD_TIME}' -X 'github.com/cicbyte/docrawl/cmd.GitCommit=${COMMIT}' -X 'github.com/cicbyte/docrawl/cmd.GitBranch=${GITHUB_REF_NAME}'" -o docrawl.exe

      - uses: actions/upload-artifact@v4
        with:
          name: docrawl-windows-amd64
          path: docrawl.exe
